[pytest]
# Configuración de pytest para pruebas con Selenium

# Directorio de pruebas
testpaths = tests

# Patrones de archivos de prueba
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de verbosidad
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers personalizados
markers =
    e2e: Pruebas end-to-end con Selenium
    login: Pruebas de autenticación
    navigation: Pruebas de navegación
    modules: Pruebas de módulos
    slow: Pruebas que tardan más tiempo
    chrome: Pruebas solo en Chrome
    firefox: Pruebas solo en Firefox
    edge: Pruebas solo en Edge

# Timeout para pruebas
timeout = 60

# Configuración de logs
log_cli = true
log_cli_level = INFO
log_file = tests/logs/pytest.log
log_file_level = DEBUG
