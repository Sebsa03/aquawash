# ============================================================
# SonarCloud — Aqua Wash
# ============================================================

sonar.projectKey=Sebsa03_aquawash
sonar.organization=sebsa03

# Fuentes de código productivo (NO archivos de prueba ad-hoc)
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests

# Encoding
sonar.sourceEncoding=UTF-8

# -------------------------------------------------------
# EXCLUSIONES DE ANÁLISIS
# Los archivos en backend/archive/ son scripts de
# desarrollo temporal (migraciones, pruebas manuales).
# No forman parte del código en producción y contienen
# credenciales de entorno local que generarían falsos
# positivos de seguridad en SonarCloud.
# -------------------------------------------------------
sonar.exclusions=\
  backend/archive/**,\
  backend/**/__pycache__/**,\
  backend/**/*.pyc,\
  frontend/node_modules/**,\
  frontend/dist/**,\
  frontend/public/**,\
  **/*.min.js,\
  **/lighthouse.json,\
  **/duplicate_report.json

# Excluir archive/ también del conteo de duplicados
sonar.cpd.exclusions=backend/archive/**

# Cobertura de tests (pytest-cov genera este archivo)
sonar.python.coverage.reportPaths=backend/coverage.xml

# Versión del lenguaje Python
sonar.python.version=3.11
